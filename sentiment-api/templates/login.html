<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraOS — Login</title>
  <style>
    :root {
      --primary: #8A2BE2;
      --secondary: #1E90FF;
      --bg: #f8f9fa;
      --surface: #ffffff;
      --text: #2c3e50;
      --text-muted: #6c757d;
      --border: #e9ecef;
      --shadow: rgba(0,0,0,0.1);
      --danger: #dc3545;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: var(--surface);
      border-radius: 8px;
      box-shadow: 0 2px 16px var(--shadow);
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    h1 {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--text);
    }

    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      color: var(--text);
      background: var(--surface);
    }

    input[type="password"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.1);
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.75rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button[type="submit"]:hover {
      opacity: 0.9;
    }

    .error {
      color: var(--danger);
      font-size: 0.875rem;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: rgba(220, 53, 69, 0.08);
      border-radius: 4px;
      border-left: 3px solid var(--danger);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>AuraOS</h1>
      <p class="subtitle">Backend-Verwaltung</p>
    </div>
    <form method="POST">
      <label for="password">Passwort</label>
      <input type="password" id="password" name="password" required autofocus placeholder="••••••••">
      <button type="submit">Anmelden</button>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
    </form>
  </div>
</body>
</html>
